# Parámetros de optimización multiobjetivo — CU3 (ur5_trajectory_optimization)
# Leídos por run_optimization.py. Los parámetros de la trayectoria base (puntos
# fijos, orientación, duración) se leen de ur5_pick_place/config/pick_place_params.yaml.

# ── Variable de decisión: posición del punto de via ──────────────────────────
# Dominio de búsqueda en frame base_link (= world frame del URDF Pinocchio).
# Los puntos fijos de la trayectoria (en el mismo frame) son:
#   point_B      = [0.65,  0.55, 0.20]   # gripper_tcp, base_link
#   point_C      = [0.65, -0.55, 0.20]   # gripper_tcp, base_link
#   obstacle      center=[0.85, 0.00, 0.10], half=[0.20, 0.30, 0.10]
#   obstacle top  z = 0.20 m  (= z_B = z_C)
#
# IMPORTANTE: via_z_min >= 0.25 para garantizar que el via-point esté SIEMPRE
# por encima del plano de pick/place (z=0.20) y del obstáculo (top z=0.20).
# Si via_z_min < 0.20 el optimizador puede elegir trayectorias que bajan entre
# B y C, lo que genera picos de velocidad en joint 2 que abortan el controlador.
#
# Rango x: cubre el volumen sobre el obstáculo (x=[0.65,1.05]) y sus alrededores.
# Rango y: franja central sobre el obstáculo (|y| < 0.30 = half_extent_y).
# Rango z: siempre por encima del plano B-C (z>0.20) hasta la altura nominal (z=0.60).
via_x_min:  0.50   # >= 0.50 evita retraccion excesiva del brazo (Joint 2 abort en JTC)
via_x_max:  0.95
via_y_min: -0.25
via_y_max:  0.25
via_z_min:  0.25   # >= 0.20 (z_B = z_C = top obstáculo); evita arcos que bajan
via_z_max:  0.60   # DLS IK converge hasta z≈0.52; limite conservador (C++ QP llega a 0.55)

# ── Muestreo de la trayectoria para el optimizador ───────────────────────────
# pts_per_seg más pequeño → evaluación más rápida (suficiente para el NSGA-II).
# Usar pts_per_seg >= 20 solo para la evaluación final del candidato seleccionado.
pts_per_seg: 8

# ── Parámetros NSGA-II (pymoo) ───────────────────────────────────────────────
pop_size:  60
n_gen:    120
seed:      42

# ── Parámetros ε-constraint (scipy.optimize) ─────────────────────────────────
# Barrido 2D: un barrido sobre f1 (esfuerzo) y otro sobre f3 (clearance).
# El barrido sobre f3 produce soluciones con variedad de holgura TCP-obstáculo,
# lo que el barrido solo sobre f1 no cubre (f2 y f3 quedan casi constantes).
n_epsilon_f1: 20   # pasos ε sobre f1: minimiza f2+f3  s.t. f1 ≤ ε₁
n_epsilon_f3: 15   # pasos ε sobre f3: minimiza f1+f2  s.t. f3 ≤ ε₃

# ── Selección de la solución de compromiso ────────────────────────────────────
# knee:        mínima distancia normalizada al punto utopía (recomendado)
# min_effort:  mínimo f1 (esfuerzo articular)
# weighted:    suma ponderada en espacio normalizado (usar con weights)
selection_method: knee
weights: [1.0, 1.0, 1.0]   # pesos [w_f1, w_f2, w_f3] para method=weighted

# ── Solver IK (damped least-squares) ────────────────────────────────────────
ik_max_iter: 120
ik_tol:       1.0e-4   # norma del error de pose [m / rad]
ik_lambda:    0.05     # factor de amortiguamiento (Levenberg-Marquardt)
ik_alpha:     0.8      # step size

# ── Directorio de resultados ──────────────────────────────────────────────────
# Vacío → $HOME/ur5_ws/src/ur5_utec/ur5_trajectory_optimization/results
results_dir: ""
