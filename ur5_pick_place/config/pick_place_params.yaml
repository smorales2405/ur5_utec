pick_place_node:
  ros__parameters:

    # -- Metodo de interpolacion --------------------------------------------------
    method: "clamped_spline"

    # -- Numero de waypoints por segmento ----------------------------------------
    points_per_segment: 20

    # -- Duracion total del movimiento A->via->B (segundos) ----------------------
    # Con RTF ~= 7.4%: 2.0 s sim = ~27 s reales.
    total_duration: 2.0

    # -- Retardo antes del primer waypoint ---------------------------------------
    # Spawn ur5e en Gazebo: [0, -pi/2, 0, -pi/2, 0, 0].
    # A_pre en [0.0, 0.7, 0.25] requiere q0~=pi/2: delta_max ~= 1.7 rad.
    # A 2.09 rad/s (limite UR5e): minimo ~0.8 s sim. Con 2.5 s hay margen amplio.
    start_delay: 2.5

    # -- Orientacion fija del TCP ------------------------------------------------
    # rpy = [pi, 0, -pi/2]: gripper apuntando hacia abajo (verificado con FK ur5e).
    tcp_orientation_rpy: [3.14159, 0.0, -1.5708]

    # -- Puntos clave en frame base_link (= world frame de Pinocchio) -----------
    # Coordenadas [x, y, z] en metros del frame gripper_tcp; z=0 en la base del robot.
    #
    # Pinocchio resuelve la IK apuntando directamente al frame 'gripper_tcp',
    # registrado en el modelo como frame fijo a 0.141 m de tool0 en Z local
    # (offset derivado de ur5_robotiq_2f85.urdf.xacro, ver IKWrapper).
    # Conversion a Gazebo world: z_Gazebo = z + 0.63
    #
    # En RViz (Fixed Frame = base_link): los markers aparecen en estas coordenadas.

    point_A_pre:  [0.0,  0.7, 0.15]   
    point_A:      [0.65,  0.55, 0.2]  
    point_via:    [0.65,  0.00, 0.55]   
    point_B:      [0.65, -0.55, 0.2]   
    point_B_post: [0.0, -0.7, 0.15] 

    # Duracion [s sim] de los segmentos de aproximacion/retirada (A_pre->A y B->B_post).
    # A_pre->[0.0,0.7] a A->[0.65,0.55]: delta q0~=0.87 rad -> minimo ~0.4 s sim.
    # Con 2.0 s hay margen para velocidades de joint <= 0.5 rad/s (bien dentro del limite).
    pre_post_duration: 2.0

    # -- Seed articular para la IK del primer waypoint ---------------------------
    # Verificado con ur5e.urdf: IK converge en toda la cadena A_pre->A->via->B->B_post.
    home_joint_angles: [0.87, -0.80, 2.00, -2.20, -1.5708, 0.87]

    # -- Parametros del solver QP ------------------------------------------------
    ik_max_iterations: 450
    ik_alpha: 0.5
    ik_weight_pos: 1.0
    ik_weight_orient: 1.0

    # -- Exportacion CSV ---------------------------------------------------------
    csv_output_dir: ""

    # -- Geometria del obstaculo (frame Pinocchio) --------------------------------
    # AABB de mesa_bidones + margen seguridad.
    # mesa_bidones Gazebo pose: (0.3, 0.0, 0.289901); escala mesh 0.01.
    # z_pin = z_gazebo - 0.63 -> tapa ~= -0.37 m, base ~= -0.55 m.
    obstacle_center:       [0.30,  0.00, -0.46]
    obstacle_half_extents: [0.20,  0.30,  0.09]
    obstacle_r_grip:       0.05
    obstacle_delta_safe:   0.05

    # -- Limites articulares UR5e [rad] ------------------------------------------
    # Fuente: UR5e datasheet (+-360 deg todos; codo +-180 deg).
    joint_q_min: [-6.2832, -6.2832, -3.1416, -6.2832, -6.2832, -6.2832]
    joint_q_max: [ 6.2832,  6.2832,  3.1416,  6.2832,  6.2832,  6.2832]
